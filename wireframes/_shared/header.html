  <!-- ============================================= -->
  <!-- HEADER / NAVIGATION                           -->
  <!-- ============================================= -->
  <header id="site-header" class="fixed top-0 left-0 w-full z-50 transition-all duration-500">
    <nav class="relative flex items-center justify-between px-5 md:px-8 lg:px-12 xl:px-16 py-4 lg:py-5">

      <!-- Logo: Desktop left | Mobile centered -->
      <a href="#"
        class="relative flex items-center lg:static absolute left-1/2 -translate-x-1/2 lg:translate-x-0 lg:left-auto group"
        id="logo-link">
        <!-- White Logo (Default/transparent header) -->
        <img src="../SVG/LOGO FULL TAGLINE/LOGO-02.svg" alt="XANH Design &amp; Build"
          class="h-8 lg:h-9 w-auto logo-white transition-opacity duration-300" />
        <!-- Normal/Dark Logo (Scrolled header) -->
        <img src="../SVG/LOGO FULL TAGLINE/LOGO-01.svg" alt="XANH Design &amp; Build"
          class="h-8 lg:h-9 w-auto absolute top-1/2 -translate-y-1/2 left-0 opacity-0 logo-dark transition-opacity duration-300" />
      </a>

      <!-- Desktop Menu -->
      <ul class="hidden lg:flex items-center gap-10" id="desktop-menu">
        <li><a href="#"
            class="nav-link text-white/90 text-sm font-medium uppercase tracking-[0.1em] hover:text-white transition-colors duration-300 relative">Trang
            Chủ</a></li>
        <li><a href="#"
            class="nav-link text-white/90 text-sm font-medium uppercase tracking-[0.1em] hover:text-white transition-colors duration-300 relative">Giới
            Thiệu</a></li>
        <li><a href="#"
            class="nav-link text-white/90 text-sm font-medium uppercase tracking-[0.1em] hover:text-white transition-colors duration-300 relative">Dự
            Án</a></li>
        <li><a href="#"
            class="nav-link text-white/90 text-sm font-medium uppercase tracking-[0.1em] hover:text-white transition-colors duration-300 relative">Dịch
            Vụ</a></li>
        <li><a href="#"
            class="nav-link text-white/90 text-sm font-medium uppercase tracking-[0.1em] hover:text-white transition-colors duration-300 relative">Blog</a>
        </li>
      </ul>

      <!-- Desktop CTA -->
      <a href="#" class="hidden lg:inline-flex btn btn--primary py-2.5 px-6 min-w-0 text-sm tracking-[0.1em]"
        id="header-cta">
        <i data-lucide="phone" class="btn__icon"></i>
        Đặt Lịch Tư Vấn
      </a>

    </nav>
  </header>

  <!-- Mobile Menu Toggle — Fixed above drawer for close functionality -->
  <button class="lg:hidden fixed top-4 right-5 z-[1010] w-10 h-10 flex flex-col justify-center items-center gap-[6px]"
    id="mobile-menu-btn" aria-label="Toggle Menu">
    <span class="hamburger-line block w-5 h-[1.5px] bg-white transition-all duration-300 ease-out origin-center"></span>
    <span class="hamburger-line block w-5 h-[1.5px] bg-white transition-all duration-300 ease-out origin-center"></span>
    <span class="hamburger-line block w-5 h-[1.5px] bg-white transition-all duration-300 ease-out origin-center"></span>
  </button>

    class="fixed inset-0 bg-black/60 z-[998] opacity-0 pointer-events-none transition-opacity duration-400"></div>

    aria-label="Mobile navigation">

            Dự Án
            <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-white/40"></i>
          </a>
        </li>
        <li>

          </a>
        </li>
